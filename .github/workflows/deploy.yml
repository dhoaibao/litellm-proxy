name: Deploy to Server

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy LiteLLM Proxy
    runs-on: ubuntu-latest
    environment: Hetzner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'EOF'
          set -e
          cd ${{ vars.DEPLOY_PATH }}

          # Update .env file with secrets
          rm -rf .env
          cat > .env << 'ENDFILE'
          LITELLM_MASTER_KEY=${{ secrets.LITELLM_MASTER_KEY }}
          OPENCODE_API_KEY=${{ secrets.OPENCODE_API_KEY }}
          PRIVATE_API_PROXY_URL=${{ secrets.PRIVATE_API_PROXY_URL }}
          PRIVATE_API_KEY=${{ secrets.PRIVATE_API_KEY }}
          UI_USERNAME=${{ secrets.UI_USERNAME }}
          UI_PASSWORD=${{ secrets.UI_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ENDFILE

          git pull origin main
          docker compose pull
          docker compose up -d --force-recreate --remove-orphans
          docker image prune -f

          echo "Deploy completed successfully"
          EOF
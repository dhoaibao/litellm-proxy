name: Deploy to Server

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy LiteLLM Proxy
    runs-on: ubuntu-latest
    environment: Hetzner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest changes from git
            git pull origin main

            # Pull latest Docker image
            docker compose pull

            # Restart containers (config.yaml is mounted, new config is read on restart)
            docker compose up -d --remove-orphans

            # Cleanup unused images
            docker image prune -f

            echo "Deploy completed successfully"
          EOF

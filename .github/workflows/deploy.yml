name: Deploy to Server

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy LiteLLM Proxy
    runs-on: ubuntu-latest
    environment: Hetzner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'EOF'
          set -e
          echo "Current dir: $(pwd)"
          echo "Deploy path: ${{ secrets.DEPLOY_PATH }}"
          ls -la ${{ secrets.DEPLOY_PATH }}/
          cd ${{ secrets.DEPLOY_PATH }}
          echo "After cd: $(pwd)"
          git status
          EOF
name: Deploy to Server

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy LiteLLM Proxy
    runs-on: ubuntu-latest
    environment: Hetzner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'EOF'
          set -e
          cd ${{ vars.DEPLOY_PATH }}

          # Update .env file with secrets
          mkdir -p .env 2>/dev/null || true
          echo 'LITELLM_MASTER_KEY=${{ secrets.LITELLM_MASTER_KEY }}' > .env
          echo 'OPENCODE_API_KEY=${{ secrets.OPENCODE_API_KEY }}' >> .env
          echo 'ANTIGRAVITY_API_BASE=${{ secrets.ANTIGRAVITY_API_BASE }}' >> .env

          git pull origin main
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f

          echo "Deploy completed successfully"
          EOF
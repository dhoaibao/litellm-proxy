litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 60
  allowed_fails: 3
  set_verbose: false
  json_logs: true
  cache: true
  cache_params:
    type: local
    ttl: 3600

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - "claude-opus-4-7": ["private/claude-sonnet-4-6"]
    - "claude-sonnet-4-6": ["private/claude-sonnet-4-6"]
    - "claude-haiku-4-5-20251001": ["private/claude-sonnet-4-6"]
  context_window_fallbacks:
    - "claude-opus-4-7": ["private/claude-sonnet-4-6"]
    - "claude-sonnet-4-6": ["private/claude-sonnet-4-6"]
    - "claude-haiku-4-5-20251001": ["private/claude-sonnet-4-6"]
  default_fallbacks: ["private/minimax-m2.7"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  proxy_batch_write_at: 60
  user_api_key_cache_ttl: 300
  disable_error_logs: true
  allow_requests_on_db_unavailable: true
model_list:
  # --- Anthropic-native ---
  - model_name: opencode-go/minimax-m2.7
    litellm_params:
      model: anthropic/minimax-m2.7
      api_base: https://opencode.ai/zen/go
      api_key: os.environ/OPENCODE_API_KEY

  - model_name: opencode-go/minimax-m2.5
    litellm_params:
      model: anthropic/minimax-m2.5
      api_base: https://opencode.ai/zen/go
      api_key: os.environ/OPENCODE_API_KEY

  # --- OpenAI-compat ---
  - model_name: opencode-go/glm-5.1
    litellm_params:
      model: openai/glm-5.1
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY

  - model_name: opencode-go/glm-5
    litellm_params:
      model: openai/glm-5
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY

  - model_name: opencode-go/kimi-k2.5
    litellm_params:
      model: openai/kimi-k2.5
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY

  - model_name: opencode-go/qwen3.6-plus
    litellm_params:
      model: openai/qwen3.6-plus
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY

  # --- Antigravity Proxy ---
  - model_name: antigravity/claude-opus-4-6-thinking
    litellm_params:
      model: anthropic/claude-opus-4-6-thinking
      api_base: os.environ/ANTIGRAVITY_API_PROXY_URL
      api_key: dummy
      cache_control_injection_points:
        - location: message
          role: system

  - model_name: antigravity/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: os.environ/ANTIGRAVITY_API_PROXY_URL
      api_key: dummy
      cache_control_injection_points:
        - location: message
          role: system

  - model_name: antigravity/gemini-3.1-pro-high
    litellm_params:
      model: anthropic/gemini-3.1-pro-high
      api_base: os.environ/ANTIGRAVITY_API_PROXY_URL
      api_key: dummy
      
  # --- Private Proxy ---
  - model_name: private/minimax-m2.7
    litellm_params:
      model: anthropic/minimax-m2.7
      api_base: os.environ/PRIVATE_API_PROXY_URL
      api_key: os.environ/PRIVATE_API_KEY

  # --- Aliases ---
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_base: os.environ/PRIVATE_API_PROXY_URL
      api_key: os.environ/PRIVATE_API_KEY
      cache_control_injection_points:
        - location: message
          role: system

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: os.environ/PRIVATE_API_PROXY_URL
      api_key: os.environ/PRIVATE_API_KEY
      cache_control_injection_points:
        - location: message
          role: system

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_base: os.environ/PRIVATE_API_PROXY_URL
      api_key: os.environ/PRIVATE_API_KEY
      cache_control_injection_points:
        - location: message
          role: system

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 60
  allowed_fails: 3
  cache: True
  cache_params:
    type: local
    ttl: 3600

router_settings:                                                                                                                                                                             
    fallbacks:                                                                                                                                                                                   
      - "claude-opus-4-7": ["antigravity/claude-opus-4-6-thinking", "antigravity/gemini-3.1-pro-high", "opencode-go/minimax-m2.7"]                                                                                                                                  
      - "claude-sonnet-4-6": ["private/minimax-m2.7", "opencode-go/minimax-m2.5"] 
      - "claude-haiku-4-5-20251001": ["opencode-go/minimax-m2.5"]
    default_fallbacks: ["opencode-go/minimax-m2.5"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
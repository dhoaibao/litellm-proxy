services:
  db:
    image: postgres:16
    container_name: litellm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-change-me}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmproxy -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - PRIVATE_API_KEY=${PRIVATE_API_KEY}
      - PRIVATE_API_PROXY_URL=${PRIVATE_API_PROXY_URL}
      - UI_USERNAME=${UI_USERNAME}
      - UI_PASSWORD=${UI_PASSWORD}
      - DATABASE_URL=postgresql://llmproxy:${LITELLM_DB_PASSWORD:-change-me}@db:5432/litellm
      - STORE_MODEL_IN_DB=true

volumes:
  db_data: